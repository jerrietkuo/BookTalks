<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookTalks</title>
    <link href="https://fonts.googleapis.com/css2?family=Adamina&display=swap" rel="stylesheet">
    <link href="./main.css" rel="stylesheet" />

       
</head>
<body>
    <header>
        <h1>BookTalks</h1>
        <p class="slogan"> A place for book lovers</p>
    </header>
    <div class="menu-bar">
        <input type="text" placeholder="Search books...">
        <a href="index.html">Home</a>
        <a href="community.html">Community</a>
        <a href="browse.html">Browse</a>
        <a href="loggedin.html" class="button">Login</a>
        <a href="signup.html" class="button">Signup</a>
    </div>
    <div class="main-content">
        <div class="comments-pane" id="none">
            <h2>Notifications</h2>
            Login to view comments.
        </div>
        <div class="content-section">
            <div class="banner">
                2024 reading goal: 24 of 50 books
            </div>
            <div class="banner-topbooks">
                Top Books of The Summer ☀️
            </div>
            <div class="grid-container">
                <div class="image-container">
                    <img src="./images/v6_31.png" alt="Image 1" class="image">
                    <div class="flipped">
                        <p>Text 1</p>
                    </div>
                </div>
                <div class="image-container">
                    <img src="./images/v6_35.png" alt="Image 2" class="image">
                    <div class="flipped">
                        <p>Text 2</p>
                    </div>
                </div>
                <div class="image-container">
                    <img src="./images/v6_39.png" alt="Image 3" class="image">
                    <div class="flipped">
                        <p>Text 3</p>
                    </div>
                </div>
                <div class="image-container">
                    <img src="./images/v6_29.png" alt="Image 4" class="image">
                    <div class="flipped">
                        <p>Text 4</p>
                    </div>
                </div>
                <div class="image-container">
                    <img src="./images/v6_37.png" alt="Image 5" class="image">
                    <div class="flipped">
                        <p>Text 5</p>
                    </div>
                </div>
                <div class="image-container">
                    <img src="./images/v6_33.png" alt="Image 6" class="image">
                    <div class="flipped">
                        <p>Text 6</p>
                    </div>
                </div>
                <div class="image-container">
                    <img src="./images/v6_51.png" alt="Image 7" class="image">
                    <div class="flipped">
                        <p>Text 7</p>
                    </div>
                </div>
                <div class="image-container">
                    <img src="./images/v6_45.png" alt="Image 8" class="image">
                    <div class="flipped">
                        <p>Text 8</p>
                    </div>
                </div>
            </div>
            <div class="notifications">
                <h2>See what everyone is talking about</h2>
                <div id="notifications-container">
                    <!-- Notifications will be inserted here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
